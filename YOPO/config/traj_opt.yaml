# IMPORTANT: velocity in testing (modifiable)
velocity: 6.0

# IMPORTANT: vel_max and acc_max in training
# not the actual values in testing, ensure consistency between testing and training, please refer to ../policy/primitive.py
vel_max_train: 6.0
acc_max_train: 6.0

# IMPORTANT: weight of costs for unit speed (can be visualized in tensorboard)
wg: 0.15   # guidance     (approaching the goal)
ws: 10.0   # smoothness   (smaller jerk)
wa: 1.0    # acceleration (smaller acceleration)
wc: 1.0    # collision    (distance to obstacle)

# dataset: set image_size = primitive_num × downsampling_factor (×32 for ResNet-18) in each axis
dataset_path: "../dataset"
dataset_dynamic_path: "../dataset_dynamic/v3"   # 🟦 stage-3.6 v3 production bake (8000 seq, 3.9 GB; 4x v2); v1/v2 kept for reproducibility
image_height: 96
image_width: 160

# trajectory and primitive param (Note: traj_time = 2 * radio / vel_max) (can be visualized in rviz)
horizon_num: 5
vertical_num: 3
horizon_camera_fov: 90.0
vertical_camera_fov: 60.0
horizon_anchor_fov: 30.0
vertical_anchor_fov: 30.0
radio_range: 5.0    # planning horizon: 2 * radio_range
radio_num: 1        # only support 1 currently

# safety penalties
d0: 1.2
r: 0.6

# distribution for unit state sampling (can be visualized by 'python ./policy/yopo_dataset.py')
vx_mean_unit: 0.4
vy_mean_unit: 0.0
vz_mean_unit: 0.0
vx_std_unit: 2.0
vy_std_unit: 0.45
vz_std_unit: 0.3
ax_mean_unit: 0.0
ay_mean_unit: 0.0
az_mean_unit: 0.0
ax_std_unit: 0.5
ay_std_unit: 0.5
az_std_unit: 0.3
goal_pitch_std: 10.0  # clip goal_length to: 2 * radio_range; 10% probability [0, 2 * radio_range]
goal_yaw_std: 20.0

# extend the map to avoid trajectory exceeding bounds (especially in z-axis) and treating the sky outside the map as obstacle
map_expand_min: [0, 0, 0.2]
map_expand_max: [0, 0, 6.0]

# === REACT additions ===
# 🟩 PEMTRS port (stage 1): reVAE is wired in YopoNetwork as an auxiliary
# encoder; frame_buffer/selector/gru_decoder modules exist on disk but
# are not yet on the training graph (single-frame dataset). They wake up
# in stages 2 and 3.
revae:
  enable: true
  latent_dim: 128
  lam_recon: 1.0         # weight inside revae_loss
  lam_kl: 0.001          # weight inside revae_loss (small to avoid posterior collapse)
frame_buffer:
  K: 10                  # sliding window size (5~15 per PEMTRS); used by stage-3.4 temporal forward
  enable_temporal: false # 🟦 stage-3.4: turn on K-frame forward in YopoNetwork.  When true,
                         # the trainer also asks DynamicYOPOWrapper to return (K,1,H,W) rather
                         # than the single-frame (1,H,W) it returns to stage-3.1/3.2 callers.
selector:
  d_model: 128
  n_heads: 4
  n_layers: 2
  future_horizon: 5      # 🟧 N-step ROI prediction (REACT upgrade); stage 2 enables it
gru_decoder:
  hidden: 256
  num_layers: 2
loss_weights:
  lam_vae: 0.1           # 🟩 stage-1: multiplier applied to revae_loss in total training loss
  lam_dyn: 3.0           # 🟧 stage-3.1: motion_reshaped_collision_loss weight (highest per guide §3.6)
  lam_kino: 0.5          # 🟧 stage-3.1: kinodynamic_loss weight

# 🟧 stage-3.1+3.2 dynamic-attention config.
# max_dyn_obs (stage-3.1): obstacle slots packed per batch by DynamicYOPOWrapper.
# enable / n_heads (stage-3.2): turn on the DCA side channel inside YopoNetwork.
# When enable=false, YopoNetwork(use_dca=False) leaves the DCA modules
# uninstantiated -> param count + training dynamics identical to stage-3.1.
dynamic_attention:
  max_dyn_obs: 8
  enable: true        # 🟧 stage-3.2: side-channel DCA on
  n_heads: 1          # head_in = 201 isn't divisible by 4; 1 head is safe

# 🟧 stage-3.1 dynamic-obstacle losses (only applied when batch has dyn_obs)
motion_reshaped:
  alpha:  2.0            # closing-speed reshape gain; bigger -> bigger penalty for fast approaches
  d_safe: 0.6            # m; softplus hinge below this surface distance
kinodynamic:
  v_max:  8.0            # m/s   (guide §3.6 default; align with controller envelope)
  a_max: 10.0            # m/s^2
  j_max: 30.0            # m/s^3
# 🟧 stage-3.1: probability that a training step samples from dataset_dynamic/v1
# instead of the static dataset.  Top-level key (NOT nested under `train`) because
# config/config.py overrides `cfg["train"] = True` at load time, which would
# clobber any nested setting there.
dynamic_ratio: 0.5